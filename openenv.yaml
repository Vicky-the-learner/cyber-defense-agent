name: cyber-defense-agent
description: AI-powered cyber defense environment that detects and responds to attacks
version: 1.0

endpoints:
  reset: /reset
  step: /step
  state: /state
  tasks: /tasks
  grader: /grader/{level}
  baseline: /baseline

observation_space:
  type: object
  properties:
    input:
      type: string
    analysis:
      type: object
      properties:
        attack:
          type: string
        confidence:
          type: number
        message:
          type: string

action_space:
  type: object
  properties:
    action:
      type: string
      enum:
        - BLOCK_IP
        - SANITIZE_INPUT
        - ALLOW

reward:
  type: float
  range: [0.0, 1.0]

done:
  type: boolean
  description: Indicates whether the episode is complete

tasks:
  levels:
    - easy
    - medium
    - hard

metadata:
  author: OpenEnv Hackathon
  domain: cybersecurity
  difficulty: multi-level