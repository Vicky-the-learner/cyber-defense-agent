<!DOCTYPE html>
<html>
<head>
    <title>Cyber Defense Agent</title>

    <style>
        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background: linear-gradient(270deg, #0b1220, #0f172a, #020617);
            background-size: 600% 600%;
            animation: gradientMove 12s ease infinite;
            color: #e5e7eb;
        }

        @keyframes gradientMove {
            0% {background-position: 0% 50%;}
            50% {background-position: 100% 50%;}
            100% {background-position: 0% 50%;}
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 50px 20px;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #9ca3af;
            margin-bottom: 40px;
        }

        .card {
            background: rgba(17, 24, 39, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 14px;
            padding: 22px;
            margin-bottom: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 12px;
            font-weight: 500;
        }

        button {
            background: #2563eb;
            border: none;
            padding: 10px 18px;
            color: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.25s;
        }

        button:hover {
            background: #1d4ed8;
        }

        pre {
            background: #020617;
            padding: 12px;
            border-radius: 8px;
            margin-top: 12px;
            font-size: 0.85rem;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .log-line {
            opacity: 0;
            animation: fadeIn 0.5s forwards;
        }

        @keyframes fadeIn {
            to { opacity: 1; }
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Cyber Defense Agent</h1>
    <p class="subtitle">AI-powered cyber defense training environment</p>

    <div class="card">
        <h2>Available Tasks</h2>
        <button onclick="getTasks()">Load Tasks</button>
        <pre id="tasks"></pre>
    </div>

    <div class="card">
        <h2>Baseline Performance</h2>
        <button onclick="getBaseline()">View Baseline</button>
        <pre id="baseline"></pre>
    </div>

    <div class="card">
        <h2>Attack Simulation</h2>
        <button onclick="simulate()">Run Simulation</button>
        <pre id="result"></pre>
    </div>

</div>

<script>
async function getTasks() {
    const res = await fetch('/tasks');
    const data = await res.json();
    document.getElementById('tasks').innerText = JSON.stringify(data, null, 2);
}

async function getBaseline() {
    const res = await fetch('/baseline');
    const data = await res.json();
    document.getElementById('baseline').innerText = JSON.stringify(data, null, 2);
}

async function simulate() {
    const resultBox = document.getElementById('result');
    resultBox.innerHTML = "";

    const steps = [
        "Detecting potential threat...",
        "Analyzing request behavior...",
        "Applying defense response...",
        "Reward assigned: +1"
    ];

    steps.forEach((step, i) => {
        setTimeout(() => {
            const line = document.createElement("div");
            line.className = "log-line";
            line.innerText = step;
            resultBox.appendChild(line);
        }, i * 600);
    });
}
</script>

</body>
</html>
