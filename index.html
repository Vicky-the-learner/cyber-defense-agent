<!DOCTYPE html>
<html>
<head>
    <title>Cyber Defense Agent</title>

    <style>
        body {
            margin: 0;
            font-family: 'Courier New', monospace;
            background: black;
            color: #00ff9f;
            overflow-x: hidden;
        }

        /* Grid background */
        body::before {
            content: "";
            position: fixed;
            width: 200%;
            height: 200%;
            background-image: linear-gradient(#00ff9f 1px, transparent 1px),
                              linear-gradient(90deg, #00ff9f 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: 0.05;
            animation: moveGrid 20s linear infinite;
        }

        @keyframes moveGrid {
            from { transform: translate(0,0); }
            to { transform: translate(-40px,-40px); }
        }

        .container {
            padding: 30px;
        }

        h1 {
            font-size: 1.8rem;
            border-bottom: 1px solid #00ff9f;
            padding-bottom: 10px;
        }

        .panel {
            border: 1px solid #00ff9f;
            padding: 15px;
            margin-top: 20px;
            background: rgba(0,0,0,0.7);
        }

        button {
            background: black;
            border: 1px solid #00ff9f;
            color: #00ff9f;
            padding: 8px 14px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: #00ff9f;
            color: black;
        }

        .terminal {
            background: black;
            padding: 10px;
            margin-top: 10px;
            height: 140px;
            overflow-y: auto;
            border: 1px solid #00ff9f;
        }

        .line {
            animation: fade 0.3s ease-in;
        }

        @keyframes fade {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .status { color: #22c55e; }
        .warning { color: #facc15; }
        .danger { color: #ef4444; }

    </style>
</head>

<body>

<div class="container">

    <h1>Cyber Defense Command Center</h1>

    <!-- TASKS -->
    <div class="panel">
        <h3>Task Levels</h3>
        <button onclick="getTasks()">Fetch Tasks</button>
        <div class="terminal" id="tasks"></div>
    </div>

    <!-- BASELINE -->
    <div class="panel">
        <h3>Baseline AI Performance</h3>
        <button onclick="getBaseline()">Run Baseline</button>
        <div class="terminal" id="baseline"></div>
    </div>

    <!-- ATTACK SIM -->
    <div class="panel">
        <h3>Live Attack Simulation</h3>
        <button onclick="simulate()">Execute</button>
        <div class="terminal" id="sim"></div>
    </div>

</div>

<script>
function addLine(container, text, cls="") {
    const div = document.createElement("div");
    div.className = "line " + cls;
    div.innerText = "> " + text;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

// ✅ FIXED API CALLS
const BASE_URL = window.location.origin;

// TASKS
async function getTasks() {
    const box = document.getElementById("tasks");
    box.innerHTML = "";

    addLine(box, "Fetching task configurations...");

    try {
        const res = await fetch(BASE_URL + '/tasks');
        const data = await res.json();

        data.tasks.forEach((t, i) => {
            setTimeout(() => {
                addLine(box, "Loaded: " + t.toUpperCase(), "status");
            }, i * 400);
        });

    } catch (err) {
        addLine(box, "Error loading tasks", "danger");
    }
}

// BASELINE
async function getBaseline() {
    const box = document.getElementById("baseline");
    box.innerHTML = "";

    addLine(box, "Running baseline AI...");

    try {
        const res = await fetch(BASE_URL + '/baseline');
        const data = await res.json();

        setTimeout(() => addLine(box, "Easy: " + data.easy, "warning"), 500);
        setTimeout(() => addLine(box, "Medium: " + data.medium, "warning"), 900);
        setTimeout(() => addLine(box, "Hard: " + data.hard, "danger"), 1300);

    } catch (err) {
        addLine(box, "Error fetching baseline", "danger");
    }
}

// SIMULATION
function simulate() {
    const box = document.getElementById("sim");
    box.innerHTML = "";

    const steps = [
        ["Injecting malicious payload...", "danger"],
        ["Analyzing traffic pattern...", "warning"],
        ["Threat detected", "status"],
        ["Blocking request...", "status"],
        ["Reward assigned: +1", "status"]
    ];

    steps.forEach((s, i) => {
        setTimeout(() => addLine(box, s[0], s[1]), i * 700);
    });
}
</script>

</body>
</html>
